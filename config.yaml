# ============================================================================
# AI Enrichment
# ============================================================================
ai:
  model: "gemini-2.0-flash"
  max_tokens: 1024
  enrichment_prompt: |
    Analyze this job listing and extract structured metadata.
    Return JSON only, no markdown, no explanation.

    If a job description is provided, use it to determine:
    - remote_friendly: true if the description mentions remote work, hybrid, or work-from-home options
    - open_to_international: true if the description does NOT require US citizenship/permanent residency,
      or explicitly mentions visa sponsorship or international candidates welcome
    - sponsorship: check for visa sponsorship mentions in the description
    - tech_stack: extract specific technologies mentioned in the description

    {
      "is_internship": true/false,
      "season": "summer_2026|fall_2026|spring_2027|summer_2027|none",
      "start_date": "YYYY-MM-DD or YYYY-MM or null",
      "end_date": "YYYY-MM-DD or YYYY-MM or null",
      "category": "swe|ml_ai|data_science|hardware|other",
      "locations": ["city, state abbreviation"],
      "is_georgia": true/false,
      "sponsorship": "sponsors|no_sponsorship|us_citizenship|unknown",
      "requires_advanced_degree": true/false,
      "graduate_friendly": true/false,
      "remote_friendly": true/false,
      "open_to_international": true/false,
      "tech_stack": ["Python", "React", ...],
      "industry": "fintech|healthcare|energy|ecommerce|banking|automotive|gaming|social_media|cybersecurity|cloud|enterprise|ai_ml|aerospace|telecom|media|food|logistics|semiconductor|other",
      "confidence": 0.0-1.0
    }
  entry_level_enrichment_prompt: |
    Analyze this job listing and determine if it is an entry-level/new-grad full-time tech position.
    This is NOT an internship — we are looking for full-time entry-level roles.
    Return JSON only, no markdown, no explanation.

    If a job description is provided, use it to determine:
    - remote_friendly: true if the description mentions remote work, hybrid, or work-from-home options
    - open_to_international: true if the description does NOT require US citizenship/permanent residency,
      or explicitly mentions visa sponsorship or international candidates welcome
    - sponsorship: check for visa sponsorship mentions in the description
    - tech_stack: extract specific technologies mentioned in the description

    {
      "is_entry_level": true/false,
      "is_internship": false,
      "category": "swe|ml_ai|data_science|quant|pm|hardware|other",
      "locations": ["city, state abbreviation"],
      "is_georgia": true/false,
      "sponsorship": "sponsors|no_sponsorship|us_citizenship|unknown",
      "requires_advanced_degree": true/false,
      "remote_friendly": true/false,
      "open_to_international": true/false,
      "tech_stack": ["Python", "React", ...],
      "industry": "fintech|healthcare|energy|ecommerce|banking|automotive|gaming|social_media|cybersecurity|cloud|enterprise|ai_ml|aerospace|telecom|media|food|logistics|semiconductor|other",
      "confidence": 0.0-1.0
    }

